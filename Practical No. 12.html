<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Bootstrap Demo</title>
 <!-- Bootstrap CSS -->
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
rel="stylesheet">
 <style>
 body {
 background-color: #f8f9fa;
 }
 footer {
 background: #212529;
 color: white;
 padding: 20px;
 text-align: center;
 }
 </style>
</head>
<body>
<!-- 
NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
 <div class="container">
 <a class="navbar-brand" href="#">MySite</a>
 <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
 <span class="navbar-toggler-icon"></span>
 </button>
 <div class="collapse navbar-collapse" id="navMenu">
 <div class="row">
 <!-- Card 1 -->
 <div class="col-md-4">
 <div class="card shadow">
 <img src="https://picsum.photos/300/200?4" class="card-img-top">
 <div class="card-body">
 <h5 class="card-title">Card One</h5>
 <p class="card-text">This is a simple card using Bootstrap.</p>
 <a href="#" class="btn btn-primary">Learn More</a>
 </div>
 </div>
 </div>
 <!-- Card 2 -->
 <div class="col-md-4">
 <div class="card shadow">
 <img src="https://picsum.photos/300/200?5" class="card-img-top">
 <div class="card-body">
 <h5 class="card-title">Card Two</h5>
 <p class="card-text">Bootstrap makes design easy and responsive.</p>
 <a href="#" class="btn btn-success">Explore</a>
 </div>
 </div>
 </div>
 <!-- Card 3 -->
 <div class="col-md-4">
 <div class="card shadow">
 <img src="https://picsum.photos/300/200?6" class="card-img-top">
 <div class="card-body">
 <h5 class="card-title">Card Three</h5>
 <p class="card-text">Use components to build modern UI quickly.</p>
 <a href="#" class="btn btn-danger">Details</a>
 </div>
 </div>
 </div>
 </div>
</div>
<!-- 
BUTTON SECTION -->
<div class="text-center mt-5">
 <button class="btn btn-primary m-2">Primary</button>
 <button class="btn btn-secondary m-2">Secondary</button>
 <button class="btn btn-warning m-2">Warning</button>
</div>
<!-- 
FOOTER -->
<footer class="mt-5">
 <p>© 2026 My Bootstrap Website | Designed for Practice</p>
</footer>
<!-- Bootstrap JS -->
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script
>

</html>
