<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Site</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
rel="stylesheet">
</head>
<body>
<!-- Navbar + Dropdown -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
<div class="container">
<a class="navbar-brand">MiniSite</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link">Home</a></li>
<li class="nav-item dropdown">
<a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Menu</a>
<ul class="dropdown-menu">
<li><a class="dropdown-item">Item 1</a></li>
<li><a class="dropdown-item">Item 2</a></li>
<!-- Breadcrumb -->
<div class="container mt-2">
<ol class="breadcrumb">
<li class="breadcrumb-item active">Home</li>
</ol>
</div>
<!-- Grid -->
<div class="container mt-3">
<div class="row">
<div class="col-md-6">
<div class="card p-3">
<h5>Card</h5>
<button class="btn btn-primary" data-bs-toggle="modal" data-bstarget="#m">Open</button>
</div>
</div>
<div class="col-md-6">
<form>
<input class="form-control mb-2" placeholder="Name">
<input class="form-control mb-2" placeholder="Email">
<button class="btn btn-success">Submit</button>
</form>
</div>
</div>
</div>
<!-- Modal -->
<div class="modal fade" id="m">
<div class="modal-dialog">
<div class="modal-content p-3">
<h5>Modal</h5>
<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script
>
</body>
</html>
